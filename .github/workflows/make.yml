---
# yamllint disable rule:line-length
name: runmake
'on':
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
jobs:
  runmake:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Run makefile
        run: make test
