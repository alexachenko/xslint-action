---
# yamllint disable rule:line-length
name: runentry
'on':
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
jobs:
  runmake:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Run entry.sh
        run: ./entry.sh 'xsl-packs/xsl-with-no-violations.xsl\nxsl-packs/xsl-with-some-violations.xsl' 'empty-content-in-instruction\ntemplate-match-starts-with-double-slash'
